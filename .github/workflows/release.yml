name: Release

# Builds platform packages with `fyne package` on native runners (Fyne uses
# CGO, so cross-compilation is avoided) and attaches them to a GitHub release.
# Trigger by pushing a semver tag: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: windows-amd64
          - os: macos-15-intel
            target: darwin-amd64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package
        shell: bash
        # fyne requires an x.y.z version; tags must look like v0.1.0.
        # GOFLAGS injects the same tag-derived version into cli.version (the
        # runtime `cowbird version` string); fyne package forwards it to the
        # underlying `go build`. Keep both derived from the tag so the packaging
        # metadata and the runtime version never drift.
        run: |
          version="${GITHUB_REF_NAME#v}"
          export GOFLAGS="-ldflags=-X=cowbird/internal/cli.version=${version}"
          fyne package --release --app-version "${version}"

      - name: Collect artifact
        shell: bash
        run: |
          mkdir dist
          case "${{ matrix.target }}" in
            # Flatten fyne's make-install tree (usr/local/...) so the binary,
            # desktop entry, and icon sit at the archive root.
            linux-*)
              tar -xf cowbird.tar.xz
              mkdir staging
              mv cowbird/usr/local/bin/cowbird \
                 cowbird/usr/local/share/applications/*.desktop \
                 cowbird/usr/local/share/pixmaps/*.png staging/
              tar -cJf "dist/cowbird-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.xz" \
                  -C staging cowbird co.avitac.cowbird.desktop co.avitac.cowbird.png
              ;;
            windows-*) 7z a "dist/cowbird-${GITHUB_REF_NAME}-${{ matrix.target }}.zip" cowbird.exe ;;
            darwin-*)  ditto -c -k --keepParent cowbird.app "dist/cowbird-${GITHUB_REF_NAME}-${{ matrix.target }}.zip" ;;
          esac

      - uses: actions/upload-artifact@v7
        with:
          name: cowbird-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      # Immutable releases seal a release's assets at the moment it is published:
      # nothing can be added, changed, or removed afterwards. So every asset must
      # be attached *before* publication. Do the canonical immutable-safe dance
      # explicitly — create the release as a draft, upload all assets to the
      # draft, then flip it to published in a single final step — rather than
      # relying on a third-party action's implicit (and version-dependent)
      # draft-first behaviour.
      - name: Create draft release
        # Idempotent: if a re-run finds the release already exists (e.g. a draft
        # left behind by an earlier failed attempt) reuse it rather than failing.
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; reusing it."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --draft \
              --verify-tag \
              --generate-notes
          fi

      - name: Upload assets to draft
        # --clobber overwrites assets from a previous attempt so retries are safe.
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish release
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --latest
